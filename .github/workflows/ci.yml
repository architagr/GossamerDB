# GitHub Actions CI workflow for GossamerDB
name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Lint, Test, and Bench
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - name: Run Unit Tests
        run: go test -v -race ./...

      - name: Run Performance Bench Gate
        # This enforces your NFR-PERF-1 < 1 ms p99 SLO commitment
        run: |
          chmod +x ./scripts/bench-check.sh
          ./scripts/bench-check.sh

      - name: Build verifying
        run: go build ./...